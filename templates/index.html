<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>haider trading bot v6.0</title>
    <style>
        :root { --accent: #f0b90b; --bg: #0b0e11; --card: #1e2329; }
        body { 
            background: var(--bg); 
            color: #eaecef; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%; 
            max-width: 480px; /* Mobile par perfect look ke liye */
            margin-top: 10px;
        }
        .dashboard { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            border: 1px solid #474d57;
            width: 100%;
            box-sizing: border-box;
        }
        <div class="dashboard">
            <div class="status-header">
                <h2 style="margin:0;">🏦 PRO ULTRA v6.0</h2>
                <div id="trend-label" style="color:#00ff00;">SCANNING 250-DAY...</div>
            </div>

            <div id="signal-display" class="signal-box">STANDBY</div>

            <div class="grid-info">
                <div class="info-item"><small>ACCURACY</small><br><b id="accuracy">--</b></div>
                <div class="info-item"><small>LIVE PRICE</small><br><b id="price">--</b></div>
                <div class="info-item"><small>250D TREND</small><br><b id="trend">--</b></div>
            </div>

            <p id="message" style="color: #848e9c;">Institutional Analysis: Offline</p>

            <input type="text" id="pair" placeholder="Enter Pair (e.g. BTCUSDT, SOLUSDT, ETHUSDT)">
            <button onclick="fetchUltraSignal()">RUN 250-DAY DEEP SCAN</button>
            <button id="autoBtn" onclick="toggleAuto()" style="background:#2b3139; color:white; border: 1px solid #474d57;">ENABLE AUTO-PILOT</button>
            <p id="auto-status">Automatic Monitoring: OFF</p>
        </div>
    </div>

    <script>
        let autoOn = false;
        let job;

        async function fetchUltraSignal() {
            let pair = document.getElementById('pair').value || 'BTCUSDT';
            document.getElementById('signal-display').innerText = "SCANNING...";
            
            const res = await fetch(`/get_signal?market=${pair}`);
            const d = await res.json();
            
            document.getElementById('signal-display').innerText = d.signal;
            document.getElementById('accuracy').innerText = d.accuracy;
            document.getElementById('price').innerText = d.price;
            document.getElementById('trend').innerText = d.trend;
            document.getElementById('message').innerText = d.message;

            const sig = document.getElementById('signal-display');
            if(d.signal.includes("BUY")) sig.style.color = "#0ecb81";
            else if(d.signal.includes("SELL")) sig.style.color = "#f6465d";
            else sig.style.color = "#eaecef";
        }

        function toggleAuto() {
            autoOn = !autoOn;
            const btn = document.getElementById('autoBtn');
            const status = document.getElementById('auto-status');
            if(autoOn) {
                btn.innerText = "STOP AUTO-PILOT";
                btn.style.borderColor = "#f6465d";
                status.innerText = "Automatic Monitoring: ACTIVE (Every 15s)";
                job = setInterval(fetchUltraSignal, 15000);
            } else {
                btn.innerText = "ENABLE AUTO-PILOT";
                btn.style.borderColor = "#474d57";
                status.innerText = "Automatic Monitoring: OFF";
                clearInterval(job);
            }
        }
    </script>
</body>
</html>
