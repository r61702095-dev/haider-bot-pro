<!DOCTYPE html>
<html>
<head>
    <title>AI Pro Advanced Bot</title>
    <style>
        body { background: #0d1117; color: white; text-align: center; font-family: sans-serif; }
        .container { border: 2px solid #00ff00; padding: 30px; margin: 50px auto; width: 350px; border-radius: 20px; background: #161b22; }
        select, button { padding: 12px; margin: 10px; border-radius: 8px; width: 80%; font-size: 16px; }
        select { background: #30363d; color: white; border: 1px solid #00ff00; }
        button { background: #238636; color: white; font-weight: bold; cursor: pointer; }
        #signal { font-size: 28px; margin: 20px; color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 AI PRO TRADER</h2>
        <p>Choose Market:</p>
        
        <select id="marketSelect">
            <option value="BTCUSDT">Bitcoin (BTC/USDT)</option>
            <option value="ETHUSDT">Ethereum (ETH/USDT)</option>
            <option value="SOLUSDT">Solana (SOL/USDT)</option>
            <option value="BNBUSDT">Binance Coin (BNB/USDT)</option>
            <option value="EURUSDT">EUR/USD (Forex Pair)</option>
            <option value="GBPUSDT">GBP/USD (Forex Pair)</option>
        </select>

        <div id="signal">READY</div>
        <div id="rsi-display">RSI: --</div>
        
        <button onclick="analyze()">START ANALYSIS</button>
    </div>

    <script>
        function analyze() {
            let market = document.getElementById('marketSelect').value;
            document.getElementById('signal').innerText = "ANALYZING...";
            fetch(`/get_signal?market=${market}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('signal').innerText = data.signal;
                    document.getElementById('rsi-display').innerText = "RSI: " + data.rsi;
                });
        }
    </script>
</body>
</html>
