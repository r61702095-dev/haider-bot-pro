<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HaiderBot — Minimal</title>
  <style>
    body { font-family: Inter, system-ui, Arial; background:#0f1724; color:#e6eef8; margin:0; }
    .wrap { max-width:960px; margin:28px auto; padding:20px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    header h1 { font-size:20px; margin:0; }
    .card { background:#0b1220; border:1px solid #1f2a44; border-radius:8px; padding:16px; margin-top:16px; }
    .signal { text-align:center; padding:18px; font-weight:700; font-size:28px; border-radius:6px; }
    .signal.wait { background:#2b3346; color:#c9d6f6; }
    .signal.buy { background:#08360f; color:#9ff3b3; }
    .signal.sell { background:#3b0b0b; color:#ffc6c6; }
    .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    select,input { padding:8px 10px; border-radius:6px; background:#071026; color:#dbeafe; border:1px solid #20304a; }
    button { padding:8px 12px; border-radius:6px; border:none; background:#0366d6; color:white; cursor:pointer; }
    button.ghost { background:#1f2a44; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th,td { text-align:left; padding:8px; border-bottom:1px solid #11182733; font-size:13px; }
    .muted { color:#a8b3c7; font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>HaiderBot</h1>
        <div class="muted">Minimal trading UI — signals & controls</div>
      </div>
      <div>
        <button onclick="getSignal()">Get Signal</button>
        <button onclick="toggleAuto()" id="auto-btn" class="ghost">Start Auto</button>
      </div>
    </header>

    <div class="card">
      <div style="display:flex; gap:12px; align-items:center; justify-content:space-between;">
        <div style="flex:1">
          <div style="display:flex; gap:8px; align-items:center;">
            <select id="symbol"><option>BTCUSDT</option><option>ETHUSD</option><option>EURUSD</option></select>
            <select id="timeframe"><option>1m</option><option>5m</option><option>15m</option></select>
            <input id="amount" type="number" value="5" style="width:80px" />
            <select id="broker"><option>Simulated</option><option>Quotex</option><option>Binance</option></select>
          </div>
        </div>
        <div style="text-align:right">
          <button onclick="executeTrade('BUY')">Buy</button>
          <button onclick="executeTrade('SELL')" style="margin-left:6px; background:#c33">Sell</button>
        </div>
      </div>

      <div style="margin-top:12px">
        <div id="signal-box" class="signal wait">ANALYZING...</div>
        <div style="display:flex; justify-content:space-between; margin-top:8px;">
          <div class="muted">Confidence: <span id="confidence">0%</span></div>
          <div class="muted">Last: <span id="last-time">--</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>Signal History</strong>
        <div class="muted">Most recent 20</div>
      </div>
      <table>
        <thead><tr><th>Time</th><th>Symbol</th><th>Signal</th><th>Conf</th></tr></thead>
        <tbody id="history-body"><tr><td colspan="4" class="muted">No signals yet</td></tr></tbody>
      </table>
    </div>

    <div style="margin-top:18px; text-align:center;" class="muted">Server API available: <code>/api/signal</code> <code>/api/trade</code></div>
  </div>

  <script>
    let autoRunning = false;
    async function getSignal(){
      const symbol = document.getElementById('symbol').value;
      const timeframe = document.getElementById('timeframe').value;
      try{
        const r = await fetch(`/api/signal?symbol=${symbol}&timeframe=${timeframe}`);
        const d = await r.json();
        document.getElementById('signal-box').textContent = d.signal || 'WAIT';
        document.getElementById('confidence').textContent = (d.confidence||0)+'%';
        document.getElementById('last-time').textContent = new Date().toLocaleTimeString();
        document.getElementById('signal-box').className = 'signal ' + (d.signal||'wait').toLowerCase();
        updateHistory(d.history || []);
      }catch(e){ alert('Signal error: '+e); }
    }

    function updateHistory(arr){
      const tbody = document.getElementById('history-body');
      if(!arr || !arr.length){ tbody.innerHTML = '<tr><td colspan="4" class="muted">No signals yet</td></tr>'; return; }
      tbody.innerHTML = arr.slice(0,20).map(it=>`<tr><td>${new Date(it.timestamp).toLocaleTimeString()}</td><td>${it.symbol}</td><td>${it.signal}</td><td>${it.confidence}%</td></tr>`).join('');
    }

    async function executeTrade(direction){
      const symbol = document.getElementById('symbol').value;
      const amount = parseFloat(document.getElementById('amount').value)||1;
      const broker = document.getElementById('broker').value;
      try{
        const res = await fetch('/api/trade',{method:'POST',headers:{'Authorization':'Bearer {{ auth_token }}','Content-Type':'application/json'},body:JSON.stringify({symbol,direction,amount,broker})});
        const j = await res.json();
        alert('Trade: '+JSON.stringify(j));
      }catch(e){ alert('Trade error: '+e); }
    }

    async function toggleAuto(){
      if(!autoRunning){
        const payload = {symbol: document.getElementById('symbol').value, timeframe: document.getElementById('timeframe').value, broker: document.getElementById('broker').value, amount: parseFloat(document.getElementById('amount').value)||1, min_confidence:75, max_trades_per_hour:6, check_interval:10 };
        try{ const r = await fetch('/api/auto/start',{method:'POST',headers:{'Authorization':'Bearer {{ auth_token }}','Content-Type':'application/json'},body:JSON.stringify(payload)}); const j=await r.json(); if(j.ok){ autoRunning=true; document.getElementById('auto-btn').textContent='Stop Auto'; } else alert('Start failed'); }catch(e){alert(e);} 
      } else {
        try{ const r = await fetch('/api/auto/stop',{method:'POST',headers:{'Authorization':'Bearer {{ auth_token }}'}}); const j=await r.json(); if(j.ok){ autoRunning=false; document.getElementById('auto-btn').textContent='Start Auto'; } else alert('Stop failed'); }catch(e){alert(e);} 
      }
    }

    // load initial
    getSignal();
  </script>
</body>
</html>
